services:
  app:
    build:
      context: ./backend
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-gassit}
      - DB_USERNAME=${DB_USERNAME:-gassit}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - MAIL_HOST=mailhog
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - SCOUT_DRIVER=meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=masterKey
    depends_on:
      - mysql
      - redis
      - meilisearch
    networks:
      - gassit

  horizon:
    build:
      context: ./backend
    command: php artisan horizon
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-gassit}
      - DB_USERNAME=${DB_USERNAME:-gassit}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - MAIL_HOST=mailhog
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - SCOUT_DRIVER=meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=masterKey
      - BROADCAST_CONNECTION=reverb
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - REVERB_APP_ID=${REVERB_APP_ID:-gassit}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-gassit-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-gassit-secret}
    depends_on:
      - mysql
      - redis
      - meilisearch
    networks:
      - gassit

  reverb:
    build:
      context: ./backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-gassit}
      - DB_USERNAME=${DB_USERNAME:-gassit}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - REVERB_APP_ID=${REVERB_APP_ID:-gassit}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-gassit-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-gassit-secret}
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - gassit

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gassit

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - gassit

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gassit}
      MYSQL_USER: ${DB_USERNAME:-gassit}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - gassit

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - gassit

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - gassit

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - gassit

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterKey
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - gassit

volumes:
  mysql_data:
  minio_data:
  meilisearch_data:

networks:
  gassit:
    driver: bridge
